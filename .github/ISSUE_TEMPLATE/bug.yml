name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include minimal steps, configuration, and relevant logs without secrets.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This report does not disclose a security vulnerability.
          required: true
