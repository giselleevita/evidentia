name: Feature request
description: Propose a scoped improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the concrete workflow or engineering problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and relevant tradeoffs.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and tenant-isolation impact
      description: Describe affected trust boundaries, permissions, or data scopes.
    validations:
      required: true
