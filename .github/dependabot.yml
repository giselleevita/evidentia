version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend/compliance-portal
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: react-router-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: react-router
        update-types: ["version-update:semver-major"]
