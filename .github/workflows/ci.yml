name: CI

on:
  push:
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"
      - name: Compile and test backend
        run: gradle build

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/compliance-portal/package-lock.json
      - name: Install dependencies
        working-directory: frontend/compliance-portal
        run: npm ci
      - name: Build
        working-directory: frontend/compliance-portal
        run: npm run build
