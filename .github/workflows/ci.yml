name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate local orchestration
        run: |
          bash -n start.sh start-backend-services.sh stop.sh
          docker compose -f infra/docker/docker-compose.yml config --quiet
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile and test backend
        run: ./gradlew build --no-daemon

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/compliance-portal/package-lock.json
      - name: Install dependencies
        working-directory: frontend/compliance-portal
        run: npm ci
      - name: Build
        working-directory: frontend/compliance-portal
        run: |
          npm run lint
          npm test -- --run
          npm run build
          npm audit --audit-level=high
