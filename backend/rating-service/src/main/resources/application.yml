spring:
  application:
    name: rating-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/evidentia_rating}
    username: ${DATABASE_USERNAME:evidentia}
    password: ${DATABASE_PASSWORD:evidentia}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_AD_ISSUER_URI:https://login.microsoftonline.com/{tenant-id}/v2.0}
          jwk-set-uri: ${AZURE_AD_JWK_SET_URI:}

server:
  port: ${SERVER_PORT:8082}

logging:
  level:
    com.evidentia: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
