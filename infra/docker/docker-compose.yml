version: '3.8'

services:
  postgres-evidence:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evidentia_evidence
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "15432:5432"
    volumes:
      - postgres_evidence_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-audit:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evidentia_audit
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5433:5432"
    volumes:
      - postgres_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-incident:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evidentia_incident
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5434:5432"
    volumes:
      - postgres_incident_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_evidence_data:
  postgres_audit_data:
  postgres_incident_data:
  postgres_rating_data:
