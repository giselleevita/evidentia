services:
  postgres-evidence:
    image: postgres:16.14-alpine3.22
    environment:
      POSTGRES_DB: evidentia_evidence
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "15432:5432"
    volumes:
      - postgres_evidence_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-audit:
    image: postgres:16.14-alpine3.22
    environment:
      POSTGRES_DB: evidentia_audit
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5433:5432"
    volumes:
      - postgres_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-incident:
    image: postgres:16.14-alpine3.22
    environment:
      POSTGRES_DB: evidentia_incident
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5434:5432"
    volumes:
      - postgres_incident_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-rating:
    image: postgres:16.14-alpine3.22
    environment:
      POSTGRES_DB: evidentia_rating
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5435:5432"
    volumes:
      - postgres_rating_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-integration:
    image: postgres:16.14-alpine3.22
    environment:
      POSTGRES_DB: evidentia_integration
      POSTGRES_USER: evidentia
      POSTGRES_PASSWORD: evidentia
    ports:
      - "5436:5432"
    volumes:
      - postgres_integration_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.9-alpine3.21
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_evidence_data:
  postgres_audit_data:
  postgres_incident_data:
  postgres_rating_data:
  postgres_integration_data:
