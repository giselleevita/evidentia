apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidence-service
  namespace: evidentia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evidence-service
  template:
    metadata:
      labels:
        app: evidence-service
    spec:
      containers:
      - name: evidence-service
        image: <ACR_NAME>.azurecr.io/evidence-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: evidence-db-secret
              key: url
        - name: AZURE_AD_ISSUER_URI
          valueFrom:
            configMapKeyRef:
              name: azure-config
              key: issuer-uri
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: evidence-service
  namespace: evidentia
spec:
  selector:
    app: evidence-service
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
