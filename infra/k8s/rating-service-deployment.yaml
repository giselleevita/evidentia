apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-service
  namespace: evidentia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rating-service
  template:
    metadata:
      labels:
        app: rating-service
    spec:
      containers:
      - name: rating-service
        image: <ACR_NAME>.azurecr.io/rating-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rating-db-secret
              key: url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: rating-service
  namespace: evidentia
spec:
  selector:
    app: rating-service
  ports:
  - port: 80
    targetPort: 8082
  type: ClusterIP
